<head>

<title>Events | Sam's Bar & Grill</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --gold: #e9be46; --orange: #f7931d; --darkest: #1a1a1b; --darker: #2c2c2d; --light: #f5f0e8; --muted: rgba(255,255,255,0.6); }
  body { background: var(--darkest); color: var(--light); font-family: 'Georgia', serif; }
  nav { position: fixed; top: 0; width: 100%; z-index: 100; background: rgba(26,26,27,0.95); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(233,190,70,0.2); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; height: 64px; }
  .nav-logo img { height: 40px; }
  .nav-links { display: flex; gap: 32px; list-style: none; }
  .nav-links a { color: var(--muted); text-decoration: none; font-family: 'Arial', sans-serif; font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; transition: color 0.2s; }
  .nav-links a:hover { color: var(--gold); }
  .page-hero { padding: 140px 40px 60px; max-width: 1100px; margin: 0 auto; }
  .page-eyebrow { font-family: 'Arial', sans-serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 20px; }
  .page-hero h1 { font-size: clamp(36px, 6vw, 72px); font-weight: normal; color: #fff; line-height: 1.1; margin-bottom: 24px; }
  .page-hero p { font-size: 18px; color: var(--muted); line-height: 1.8; max-width: 600px; font-style: italic; }
  .calendar-section { padding: 40px 40px 80px; max-width: 1100px; margin: 0 auto; }
  .cal-label { font-family: 'Arial', sans-serif; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 24px; }
  .calendar-embed { border: 1px solid rgba(233,190,70,0.2); border-radius: 2px; overflow: hidden; }
  .calendar-embed iframe { width: 100%; height: 600px; border: none; display: block; filter: invert(0.9) hue-rotate(180deg); }
  footer { background: var(--darkest); border-top: 1px solid rgba(233,190,70,0.15); padding: 40px; text-align: center; }
  .footer-links { display: flex; gap: 24px; justify-content: center; margin-bottom: 16px; }
  .footer-links a { font-family: 'Arial', sans-serif; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); text-decoration: none; }
  .footer-links a:hover { color: var(--gold); }
  .footer-copy { font-family: 'Arial', sans-serif; font-size: 11px; color: rgba(255,255,255,0.25); }
  @media (max-width: 700px) { nav { padding: 0 20px; } .nav-links { display: none; } .page-hero, .calendar-section { padding-left: 24px; padding-right: 24px; } .calendar-embed iframe { height: 400px; } }
</style>
